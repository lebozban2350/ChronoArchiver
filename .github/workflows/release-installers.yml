# Build small setup launcher (~6MB) + full app zip for Windows and macOS.
# Setup downloads full app on first run with progress bar.
# Release: ChronoArchiver-Setup-*.exe (small), ChronoArchiver-*.zip (payload)

name: Release Installers

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install full app dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller static-ffmpeg opencv-python GitPython

      - name: Build full app
        run: |
          pyinstaller --noconfirm tools/chronoarchiver.spec
          ls -la dist/ChronoArchiver
        shell: bash

      - name: Create full app zip (payload for setup)
        run: |
          Compress-Archive -Path dist/ChronoArchiver -DestinationPath "dist/ChronoArchiver-${{ steps.ver.outputs.VERSION }}-win64.zip"
        shell: pwsh

      - name: Build minimal setup launcher
        env:
          CHRONOARCHIVER_VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          pip install pyinstaller
          pyinstaller --noconfirm tools/chronoarchiver_setup.spec
          ls -la dist/
        shell: bash

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ChronoArchiver-win64
          path: |
            dist/ChronoArchiver-Setup.exe
            dist/ChronoArchiver-${{ steps.ver.outputs.VERSION }}-win64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate icon.icns for macOS bundle
        run: |
          ICONSET="src/ui/assets/icon.iconset"
          mkdir -p "$ICONSET"
          for sz in 16 32 64 128 256 512; do
            sips -z $sz $sz src/ui/assets/icon.png --out "$ICONSET/icon_${sz}x${sz}.png"
            sips -z $((sz*2)) $((sz*2)) src/ui/assets/icon.png --out "$ICONSET/icon_${sz}x${sz}@2x.png"
          done
          iconutil -c icns "$ICONSET" -o src/ui/assets/icon.icns
          rm -rf "$ICONSET"

      - name: Install full app dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller static-ffmpeg opencv-python GitPython

      - name: Build full app
        run: |
          pyinstaller --noconfirm tools/chronoarchiver.spec
          ls -la dist/

      - name: Create full app zip (payload for setup)
        run: |
          cd dist && zip -r "ChronoArchiver-${{ steps.ver.outputs.VERSION }}-mac64.zip" ChronoArchiver.app && cd ..

      - name: Build minimal setup launcher
        env:
          CHRONOARCHIVER_VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          pip install pyinstaller
          pyinstaller --noconfirm tools/chronoarchiver_setup.spec
          ls -la dist/ChronoArchiver-Setup.app

      - name: Create setup launcher zip
        run: |
          cd dist && ditto -c -k --sequesterRsrc --keepParent ChronoArchiver-Setup.app "ChronoArchiver-Setup-${{ steps.ver.outputs.VERSION }}-mac64.zip" && cd ..

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ChronoArchiver-mac64
          path: |
            dist/ChronoArchiver-Setup-${{ steps.ver.outputs.VERSION }}-mac64.zip
            dist/ChronoArchiver-${{ steps.ver.outputs.VERSION }}-mac64.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Flatten and rename artifacts
        run: |
          mkdir -p release
          for f in artifacts/ChronoArchiver-win64/*; do
            case "$f" in
              *ChronoArchiver-Setup.exe) cp "$f" "release/ChronoArchiver-Setup-${{ steps.ver.outputs.VERSION }}-win64.exe" ;;
              *) cp "$f" release/ ;;
            esac
          done
          cp artifacts/ChronoArchiver-mac64/* release/ 2>/dev/null || true
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ChronoArchiver ${{ steps.ver.outputs.VERSION }}
          draft: false
          prerelease: false
          replace_artifacts: true
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
